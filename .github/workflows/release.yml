name: release

on:
  workflow_dispatch:
    inputs:
      ref: { required: false, default: main }
      draft: { type: boolean, default: false }

jobs:
  release:
    uses: stevenfackley/gh-actions/.github/workflows/release.yml@v1
    with:
      project-name: {{PROJECT_NAME}}
      ref: ${{ inputs.ref }}
      draft: ${{ inputs.draft }}
    secrets: inherit
